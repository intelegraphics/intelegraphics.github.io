<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        * {

            padding: 0;

        body {
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            text-align: center;
            padding: 32px 24px 40px;
        }

        .icon {
            width: 80px;
            height: 80px;
            background: #4A7D4D;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 48px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1e1e2f;
            margin-bottom: 8px;
        }

        .version {
            color: #8e8e93;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .desc {
            color: #555;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 32px;
            padding: 0 8px;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #4A7D4D;
            color: white;
            font-size: 18px;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 60px;
            text-decoration: none;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(74, 125, 77, 0.3);
            margin-bottom: 24px;
            border: none;
            cursor: pointer;
        }

        .download-btn:hover {
            background: #3a643d;
            transform: scale(1.02);
        }

        .note {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 20px;
            text-align: left;
            font-size: 13px;
            color: #666;
            margin: 24px 0 16px;
        }

        .note p {
            margin: 8px 0;
        }

        .note code {
            background: #e9ecef;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 12px;
        }

        .footer {
            font-size: 12px;
            color: #aaa;
            margin-top: 24px;
        }

        hr {
            margin: 16px 0;
            border: none;
            border-top: 1px solid #eee;
        }

<body>
    <div class="card">
